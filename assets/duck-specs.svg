<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rubberduck with spectacles">
  <defs>
    <linearGradient id="rd-body-s" x1="12" y1="10" x2="48" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD64A"/>
      <stop offset="1" stop-color="#F4B412"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0d0f14"/>
  <g fill="url(#rd-body-s)">
    <ellipse cx="30" cy="42" rx="22" ry="14"/>
    <circle cx="41" cy="26" r="13"/>
  </g>
  <!-- short flat rubber-duck bill -->
  <path fill="#F47C16" d="M51 22.5c6 0 9.8 1.8 9.8 4.2S57 31 51 31c-1.5-2.8-1.5-5.7 0-8.5z"/>
  <path d="M51.5 26.7h8.7" stroke="#D9620A" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  <!-- wing -->
  <path d="M20 41c5 5.5 16 5.5 22 .5" stroke="#E0950A" stroke-width="2.6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- spectacles: both lenses sit on the head, near the bill; bold dark frames
       with a faint tint so they read clearly even at logo size -->
  <g stroke="#2b2f38" stroke-width="2.4" fill="#bfe6fb" fill-opacity="0.45">
    <circle cx="44.5" cy="24.5" r="6"/>
    <circle cx="33.5" cy="25.5" r="6"/>
  </g>
  <!-- bridge between the lenses -->
  <path d="M39.5 24.8q2.5-1.8 5 0" stroke="#2b2f38" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- arm to the back of the head -->
  <path d="M28 26l-4 2" stroke="#2b2f38" stroke-width="2.4" stroke-linecap="round"/>
  <!-- eye behind the right lens -->
  <circle cx="44.5" cy="24.5" r="2.4" fill="#22242b"/>
  <circle cx="45.5" cy="23.5" r="0.9" fill="#fff"/>
</svg>
